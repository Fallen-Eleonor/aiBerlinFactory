[phases.setup]
nixPkgs = ["nodejs", "python3", "bash"]

[phases.install]
cmds = [
  "npm install",
  "cd apps/frontend && npm install",
  "cd apps/backend && python3 -m venv .venv && .venv/bin/pip install -e .[dev]"
]

[phases.build]
dependsOn = ["install"]
cmds = ["cd apps/frontend && npm run build"]

[start]
# 1. Активируем виртуальное окружение
# 2. Запускаем бэкенд в фоновом режиме (&)
# 3. Запускаем фронтенд на основном порту ($PORT)
cmd = "source apps/backend/.venv/bin/activate && (python apps/backend/main.py & cd apps/frontend && npm run start -- -p $PORT)"