# 1. Среда (добавляем только нужное)
[phases.setup]
nixPkgs = ["nodejs", "python3", "bash"]

# 2. Установка зависимостей
[phases.install]
cmds = [
  "npm install",
  "cd apps/frontend && npm install",
  "cd apps/backend && python3 -m venv .venv && .venv/bin/pip install -e .[dev]"
]

# 3. Сборка фронтенда (КРИТИЧЕСКИ ВАЖНО для роутинга)
[phases.build]
dependsOn = ["install"]
cmds = ["cd apps/frontend && npm run build"]

# 4. Запуск (используем start вместо dev скрипта для фронта)
[start]
cmd = "cd apps/frontend && npm run start"